<svg width="1024" height="1024" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#D9673A"/>
      <stop offset="100%" stop-color="#9B2D0F"/>
    </linearGradient>
  </defs>
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>
  <!-- Ascending bars -->
  <rect x="11" y="42" width="10" height="10" rx="2.5" fill="white" fill-opacity="0.45"/>
  <rect x="25" y="30" width="10" height="22" rx="2.5" fill="white" fill-opacity="0.7"/>
  <rect x="39" y="18" width="10" height="34" rx="2.5" fill="white"/>
  <!-- Baseline -->
  <rect x="9" y="53" width="46" height="3" rx="1.5" fill="white" fill-opacity="0.3"/>
  <!-- Sparkline connecting bar tops -->
  <polyline points="16,42 30,30 44,18" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.45"/>
  <!-- Dots at top of each bar -->
  <circle cx="16" cy="42" r="3" fill="white" opacity="0.6"/>
  <circle cx="30" cy="30" r="3" fill="white" opacity="0.8"/>
  <circle cx="44" cy="18" r="3.5" fill="white"/>
</svg>
