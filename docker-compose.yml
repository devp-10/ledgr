services:
  # ── Ollama (local LLM) ────────────────────────────────────────────────────
  ollama:
    image: ollama/ollama
    volumes:
      - ollama_data:/root/.ollama   # model weights persist across restarts
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s

  # Pull llama3.2 on first run (cached in volume; subsequent starts are instant)
  ollama-init:
    image: ollama/ollama
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      - OLLAMA_HOST=http://ollama:11434
    entrypoint: ["ollama", "pull", "llama3.2"]
    restart: "no"

  # ── FastAPI backend ───────────────────────────────────────────────────────
  backend:
    build: ./expense-app/backend
    environment:
      - OLLAMA_URL=http://ollama:11434
      - DB_PATH=/data/expenses.db
    volumes:
      - db_data:/data              # SQLite database persists here
    depends_on:
      ollama:
        condition: service_healthy

  # ── React frontend (built + served by nginx) ──────────────────────────────
  frontend:
    build: ./expense-app/frontend
    ports:
      - "3000:80"                  # open http://localhost:3000
    depends_on:
      - backend

volumes:
  ollama_data:   # llama3.2 model weights (~2 GB, downloaded once)
  db_data:       # SQLite database
