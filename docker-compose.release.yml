services:
  # ── Ollama (local LLM) ────────────────────────────────────────────────────
  ollama:
    image: ollama/ollama
    volumes:
      - ollama_data:/root/.ollama   # model weights persist across restarts
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s

  # Pull model on first run (cached in volume; subsequent starts are instant)
  ollama-init:
    image: ollama/ollama
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      - OLLAMA_HOST=http://ollama:11434
      - OLLAMA_MODEL=${OLLAMA_MODEL:-mistral}
    entrypoint: ["sh", "-c", "ollama pull $${OLLAMA_MODEL}"]
    restart: "no"

  # ── FastAPI backend ───────────────────────────────────────────────────────
  backend:
    image: DOCKERHUB_USERNAME/ledgr-backend:latest
    ports:
      - "8000:8000"
    environment:
      - OLLAMA_URL=http://ollama:11434
      - OLLAMA_MODEL=${OLLAMA_MODEL:-mistral}
      - DB_PATH=/data/expenses.db
    volumes:
      - ./data:/data               # your transaction database lives here
    depends_on:
      ollama:
        condition: service_healthy

  # ── React frontend (served by nginx) ─────────────────────────────────────
  frontend:
    image: DOCKERHUB_USERNAME/ledgr-frontend:latest
    ports:
      - "3000:80"                  # open http://localhost:3000
    depends_on:
      - backend

volumes:
  ollama_data:   # model weights (downloaded once, persisted across restarts)
