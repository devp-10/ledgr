name: Publish Docker Images

# Triggers when you push a version tag: git tag v1.0.0 && git push origin v1.0.0
on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # required to create a GitHub Release

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # QEMU lets the runner emulate arm64 so we can build for Mac M1/M2/M3
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      # Buildx is the Docker plugin that enables multi-architecture builds
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # ── Backend image ───────────────────────────────────────────────────────
      - name: Build and push backend
        uses: docker/build-push-action@v5
        with:
          context: ./expense-app/backend
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/ledgr-backend:${{ github.ref_name }}
            ${{ secrets.DOCKERHUB_USERNAME }}/ledgr-backend:latest
          build-args: |
            APP_VERSION=${{ github.ref_name }}
          # Layer caching speeds up subsequent builds significantly
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── Frontend image ──────────────────────────────────────────────────────
      - name: Build and push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./expense-app/frontend
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/ledgr-frontend:${{ github.ref_name }}
            ${{ secrets.DOCKERHUB_USERNAME }}/ledgr-frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── GitHub Release ──────────────────────────────────────────────────────
      # Substitute the DOCKERHUB_USERNAME placeholder in the release compose file,
      # then attach it to the GitHub Release so users can download it directly.
      - name: Generate release docker-compose.yml
        run: |
          sed 's|DOCKERHUB_USERNAME|${{ secrets.DOCKERHUB_USERNAME }}|g' \
            docker-compose.release.yml > docker-compose.release-ready.yml

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create ${{ github.ref_name }} \
            --title "Ledgr ${{ github.ref_name }}" \
            --notes "## Install

          **Requirement**: [Docker Desktop](https://www.docker.com/products/docker-desktop/)

          Download the \`docker-compose.yml\` below, place it in an empty folder, then run:

          \`\`\`bash
          docker compose up
          \`\`\`

          Open **http://localhost:3000**. Your data is stored in \`./data/expenses.db\` in that folder.

          > First run downloads the Ollama model (~4 GB). Subsequent starts are instant.

          See the [README](https://github.com/${{ github.repository }}/blob/main/README.md) for configuration options." \
            "docker-compose.release-ready.yml#docker-compose.yml" \
            ".env.example"
